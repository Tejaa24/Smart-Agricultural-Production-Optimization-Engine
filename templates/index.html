<!DOCTYPE html>
<html>
<head>
<title>Smart Agricultural Production Optimization Engine</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="container">

<h1>🌱 Smart Agricultural Production Optimization Engine</h1>

<p>Enter soil and environmental conditions to predict the best crop.</p>


<form action="/predict" method="POST">

<input name="N" placeholder="Nitrogen (N)" required>

<input name="P" placeholder="Phosphorus (P)" required>

<input name="K" placeholder="Potassium (K)" required>

<input name="temperature" placeholder="Temperature" required>

<input name="humidity" placeholder="Humidity" required>

<input name="ph" placeholder="Soil pH" required>

<input name="rainfall" placeholder="Rainfall" required>


<button type="submit">
Predict Crop
</button>


</form>

</div>

</body>
</html>
