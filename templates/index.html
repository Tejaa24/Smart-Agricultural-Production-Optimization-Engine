{% extends "base.html" %}


{% block content %}


<div class="hero">

<h1>
AI Based Crop Recommendation System
</h1>


<p>
Optimize agricultural production using machine learning.
</p>

<form action="/predict" method="POST" onsubmit="return validateForm()"></form>

<input name="N" placeholder="Nitrogen Level" required>

<input name="P" placeholder="Phosphorus Level" required>

<input name="K" placeholder="Potassium Level" required>

<input name="temperature" placeholder="Temperature" required>

<input name="humidity" placeholder="Humidity" required>

<input name="ph" placeholder="Soil pH" required>

<input name="rainfall" placeholder="Rainfall" required>


<button>
Predict Best Crop
</button>


</form>


</div>


{% endblock %}
